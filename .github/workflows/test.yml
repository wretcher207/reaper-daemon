name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  bridge-lua:
    # The whole point of the OS matrix: the bridge's atomic write uses os.rename,
    # which on Windows can't replace an existing file. The Windows run exercises
    # the remove+retry fallback (C1) — a regression there fails here, not live.
    name: bridge self-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      # gh-actions-lua builds Lua from source; on Windows it needs the MSVC
      # toolchain (cl) on PATH or it fails with "Unable to locate executable cl".
      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"
      - name: bridge self-test (parse_display_number, atomic write, chunk splicer)
        run: lua bridge/test_bridge.lua
        shell: bash
      - name: json codec self-test (CWD-sensitive; run from repo root)
        run: lua bridge/test_json.lua
        shell: bash

  python-surfaces:
    name: Python surfaces (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Syntax-check standalone Python entry points
        run: >-
          python -m py_compile
          reaperd.py
          reaper_mcp.py
          setup/install.py
          skills/drum-apparatus/groovegen.py
          skills/drum-apparatus/examples/breakdown_world_ending.py
      - name: Compile all Python surfaces
        run: >-
          python -m compileall -q
          reaperd.py
          reaper_mcp.py
          setup
          skills/drum-apparatus
          tests
      - name: install pytest
        run: python -m pip install --quiet pytest
      - name: Root + drum-apparatus tests
        run: python -m pytest tests skills/drum-apparatus/tests -q
