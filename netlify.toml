[build]
  publish = "site"
  command = ""

# The marketing page lives on deadpixeldesign.com. Redirect everything there.
[[redirects]]
  from = "/*"
  to = "https://deadpixeldesign.com/workflows/reaper-daemon/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
